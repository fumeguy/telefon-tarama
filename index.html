<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Telefon Taranıyor...</title><style>body{margin:0;background:#111;color:#0f5;font-family:Consolas,monospace;display:flex;justify-content:center;align-items:center;height:100vh}.box{width:90%;max-width:500px;text-align:center}.progress{width:100%;height:28px;background:#333;border-radius:20px;overflow:hidden}.bar{width:0;height:100%;background:#0f5;transition:.1s}#result{display:none;color:#fff}</style></head><body><div class='box'><h1>📱 Telefon Taranıyor...</h1><div class='progress'><div class='bar' id='bar'></div></div><p id='status'>%0</p><h2 id='result'></h2></div><script>const b=document.getElementById('bar'),s=document.getElementById('status'),r=document.getElementById('result');let i=0;const t=setInterval(()=>{i++;b.style.width=i+'%';s.innerHTML='%'+i+'<br>Sistem dosyaları inceleniyor...';if(i>=100){clearInterval(t);document.querySelector('.progress').style.display='none';s.style.display='none';r.style.display='block';r.innerHTML='😂 ŞAKA!<br><br>Telefonunda hiçbir virüs yok.<br>Sadece küçük bir şakaydı. ❤️🎉';}},60);</script></body></html>
